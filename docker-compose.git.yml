version: '3.8'

services:
  pdf-generator:
    build:
      context: https://github.com/yourusername/webpage-pdf-generator.git#main
      dockerfile: Dockerfile
    container_name: webpage-pdf-generator
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    volumes:
      - pdf-downloads:/app/downloads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pdf-network

networks:
  pdf-network:
    driver: bridge

volumes:
  pdf-downloads:
    driver: local
